services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    volumes:
      - db_data:/app/data
    environment:
      - PYTHONPATH=/app

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  db_data:
